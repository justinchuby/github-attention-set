<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      width: 360px;
      max-height: 500px;
      overflow-y: auto;
      padding: 12px;
      color: #24292f;
      background: #fff;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0d1117; color: #e6edf3; }
      .pr-item { border-color: #30363d; }
      .pr-item:hover { background: #1c2128; }
      .pr-title a { color: rgb(100, 170, 255); }
      .summary { color: #9eaab6; }
      .refresh-btn { border-color: #484f58; color: #f0f6fc; }
      .refresh-btn:hover { background: #21262d; }
      .dismiss-btn { color: #c9d1d9; }
      .dismiss-btn:hover { color: #f85149; }
      .dismissed-toggle { color: #b1bac4; border-color: #484f58; }
      .restore-btn { color: rgb(100, 170, 255); border-color: #484f58; }
      .restore-btn:hover { background: #21262d; }
    }
    .header { display: flex; align-items: center; margin-bottom: 12px; gap: 8px; }
    .header h1 { margin-right: auto; }
    .header h1 { font-size: 14px; font-weight: 600; }
    .summary { font-size: 12px; color: #57606a; margin-bottom: 8px; }
    .pr-list { list-style: none; }
    .pr-item { padding: 8px 0; border-bottom: 1px solid #d0d7de; display: flex; align-items: flex-start; gap: 8px; }
    .pr-item:last-child { border-bottom: none; }
    .dot { flex-shrink: 0; margin-top: 3px; display: flex; align-items: center; }
    .pr-info { flex: 1; min-width: 0; }
    .pr-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pr-title a { color: #0969da; text-decoration: none; }
    .pr-title a:hover { text-decoration: underline; }
    .pr-meta { font-size: 11px; color: #57606a; margin-top: 2px; }
    .refresh-btn { background: none; border: 1px solid #d0d7de; border-radius: 4px; padding: 4px 8px; cursor: pointer; font-size: 11px; display: flex; align-items: center; gap: 4px; }
    .refresh-btn:hover { background: #f6f8fa; }
    .settings-btn { background: none; border: 1px solid #d0d7de; cursor: pointer; padding: 4px 8px; border-radius: 4px; color: #24292f; font-size: 11px; display: flex; align-items: center; }
    .settings-btn:hover { background: #f6f8fa; }
    @media (prefers-color-scheme: dark) { .settings-btn:hover { background: #21262d; } .settings-btn { color: #f0f6fc; border-color: #484f58; } }
    .refresh-btn svg { vertical-align: middle; }
    .dismiss-btn { background: none; border: none; cursor: pointer; padding: 4px; border-radius: 4px; color: #57606a; opacity: 0.6; transition: opacity 0.15s, color 0.15s; flex-shrink: 0; margin-top: 1px; }
    .dismiss-btn:hover { opacity: 1; color: #d73a49; }
    .dismissed-toggle { font-size: 11px; color: #57606a; margin-top: 12px; padding: 8px 0; border-top: 1px solid #d0d7de; cursor: pointer; text-align: center; display: flex; align-items: center; justify-content: center; gap: 4px; }
    .dismissed-toggle:hover { text-decoration: underline; }
    .dismissed-list { margin-top: 4px; }
    .pr-item-dismissed { opacity: 0.7; }
    .restore-btn { background: none; border: 1px solid #d0d7de; border-radius: 4px; padding: 2px 6px; cursor: pointer; font-size: 10px; color: #0969da; flex-shrink: 0; }
    .restore-btn:hover { background: #f6f8fa; }
    .error-banner { background: #fff3cd; color: #856404; border: 1px solid #ffc107; border-radius: 4px; padding: 6px 10px; font-size: 11px; margin-bottom: 8px; }
    @media (prefers-color-scheme: dark) { .error-banner { background: #3d2e00; color: #ffc107; border-color: #664d00; } }
    .empty { text-align: center; padding: 24px; color: #57606a; font-size: 13px; }
    .no-token { text-align: center; padding: 24px; }
    .no-token a { color: #0969da; }
    .spinner { display: inline-block; animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
    .pr-time { font-size: 11px; color: #8b949e; white-space: nowrap; margin-left: auto; padding: 0 6px; }
    .repo-group { margin-bottom: 12px; }
    .repo-group-title { font-size: 11px; font-weight: 700; color: #57606a; margin-bottom: 4px; padding: 4px 0; }
    @media (prefers-color-scheme: dark) { .repo-group-title { color: #c9d1d9; } .pr-meta { color: #c9d1d9; } .pr-time { color: #c9d1d9; } .empty { color: #c9d1d9; } .refresh-btn { color: #f0f6fc; border-color: #484f58; } }
    .status-section-title { font-size: 13px; font-weight: 600; margin: 12px 0 6px 0; padding: 4px 8px; border-radius: 4px; display: flex; align-items: center; gap: 6px; }
    .status-section-title.attention { background: #fff1f0; color: #cf222e; }
    .status-section-title.others { background: #f0fff4; color: #1a7f37; }
    @media (prefers-color-scheme: dark) { .status-section-title.attention { background: #3d1114; color: #f85149; } .status-section-title.others { background: #0d2818; color: #3fb950; } }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="popup.js" type="module"></script>
</body>
</html>
