<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      width: 360px;
      max-height: 500px;
      overflow-y: auto;
      padding: 12px;
      color: #24292f;
      background: #fff;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0d1117; color: #c9d1d9; }
      .pr-item { border-color: #30363d; }
      .pr-item:hover { background: #161b22; }
      .pr-title a { color: #58a6ff; }
      .summary { color: #8b949e; }
    }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .header h1 { font-size: 14px; font-weight: 600; }
    .summary { font-size: 12px; color: #57606a; margin-bottom: 8px; }
    .pr-list { list-style: none; }
    .pr-item { padding: 8px 0; border-bottom: 1px solid #d0d7de; display: flex; align-items: flex-start; gap: 8px; }
    .pr-item:last-child { border-bottom: none; }
    .dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
    .dot-red { background: #d73a49; }
    .dot-green { background: #28a745; }
    .dot-yellow { background: #dbab09; }
    .pr-info { flex: 1; min-width: 0; }
    .pr-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pr-title a { color: #0969da; text-decoration: none; }
    .pr-title a:hover { text-decoration: underline; }
    .pr-meta { font-size: 11px; color: #57606a; margin-top: 2px; }
    .refresh-btn { background: none; border: 1px solid #d0d7de; border-radius: 4px; padding: 4px 8px; cursor: pointer; font-size: 11px; }
    .refresh-btn:hover { background: #f6f8fa; }
    .empty { text-align: center; padding: 24px; color: #57606a; font-size: 13px; }
    .no-token { text-align: center; padding: 24px; }
    .no-token a { color: #0969da; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="popup.js"></script>
</body>
</html>
